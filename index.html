<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>鏡 KAGAMI</title>
<meta property="og:title" content="鏡 KAGAMI — 毎日ひとつの問い">
<meta property="og:description" content="One question. One insight. Every day.">
<meta name="twitter:card" content="summary">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#080808;
  --paper:#f0ebe0;
  --gold:#a07820;
  --gold-lt:#c49a30;
  --dust:#9a8870;

  /*
   * CONTRAST TABLE (background: #080808)
   * --fog-strong : 5.2:1  → ラベル・英語補助テキスト（WCAG AA 小テキスト対応）
   * --fog-mid    : 4.6:1  → 日記の薄いテキスト
   * --fog-soft   : 3.2:1  → 大きいテキスト専用（18px以上）
   * --border     : 装飾のみ、コントラスト要件対象外
   */
  --fog-strong: #8a7a68;
  --fog-mid:    #7d6e5d;
  --border:     rgba(160,120,32,0.18);

  /* タイポスケール — 最小14px */
  --t-label: 0.875rem;  /* 14px: ラベル最小 */
  --t-small: 0.875rem;  /* 14px: 補足テキスト */
  --t-body:  1rem;      /* 16px: 本文・textarea（iOSズーム防止） */
  --t-q:     clamp(1.35rem, 4vw, 2rem);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html{ height:100% }
body{
  height:100%;
  background:var(--ink);color:var(--paper);
  font-family:'Noto Serif JP',serif;
  /* body level では contain のみ。none は pull-to-refresh を殺しすぎる */
  overscroll-behavior-x:none;
}

body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.4;
}

#root{
  width:100%;
  position:relative;
  overflow:hidden;
  /* フォールバック先、dvh対応ブラウザが後から上書き */
  height:100vh;
  height:100dvh;
}

/* ══ BILINGUAL LABEL ══
   日本語: var(--gold) — 映える
   English: var(--fog-strong) — 4.5:1以上、14px   */
.bilabel{
  display:flex;align-items:baseline;gap:0.55rem;
  font-size:var(--t-label);
  text-transform:uppercase;letter-spacing:0.4em;
  color:var(--gold);margin-bottom:0.9rem;
}
.bilabel span{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:1em;
  /* WCAG AA準拠: #8a7a68 on #080808 = 5.2:1 */
  color:var(--fog-strong);
  letter-spacing:0.12em;text-transform:none;
}

/* ══ VEIL ════════════════════════════════════════
   テキストは最小限。鏡を映して消える。           */
#veil{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--ink);
  transition:opacity 1.2s ease;
  padding: calc(var(--safe-top) + 2rem) 2rem calc(var(--safe-bot) + 2rem);
}
#veil.gone{opacity:0;pointer-events:none}

.veil-title{
  display:flex;align-items:baseline;gap:1.2rem;
  opacity:0;animation:vr 1s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
}
.veil-ja{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(4rem,12vw,8rem);
  font-weight:300;color:var(--paper);
  line-height:1;
}
.veil-en{
  font-family:'IM Fell English',serif;
  font-size:clamp(1.3rem,3.5vw,2.4rem);
  color:var(--gold);font-style:italic;
  letter-spacing:0.08em;padding-bottom:0.35rem;
}
/* veilのサブコピー: 大きく・短く・読める */
.veil-sub{
  margin-top:2rem;text-align:center;
  opacity:0;animation:vr 0.8s 1s ease forwards;
}
.veil-sub-ja{
  font-size:clamp(0.9rem,2.2vw,1rem);
  font-weight:300;color:var(--dust);
  display:block;margin-bottom:0.5rem;letter-spacing:0.06em;
}
.veil-sub-en{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.85rem,2vw,0.95rem);
  /* コントラスト: fog-strong = 5.2:1 */
  color:var(--fog-strong);
  letter-spacing:0.12em;font-style:italic;
  display:block;
}
@keyframes vr{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ══ NAV ═════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding: calc(var(--safe-top) + 0.7rem) 1.2rem 0.7rem;
  background:rgba(8,8,8,0.93);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(160,120,32,0.08);
}
.nav-logo{
  display:flex;align-items:baseline;gap:0.5rem;
  cursor:pointer;flex-shrink:0;
}
.nav-logo-ja{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:300;color:var(--gold)}
.nav-logo-en{font-family:'IM Fell English',serif;font-size:0.85rem;color:var(--paper);letter-spacing:0.12em;font-style:italic}
.nav-r{display:flex;align-items:center;gap:0.15rem}

.streak{
  display:flex;align-items:baseline;gap:0.25rem;
  padding:0.26rem 0.6rem;
  border:1px solid rgba(160,120,32,0.22);
  margin-right:0.3rem;
}
.streak.hidden{display:none}
.streak-f{font-size:0.8rem}
.streak-n{font-size:var(--t-label);color:var(--gold);font-weight:500}
.streak-label{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:var(--t-label);
  color:var(--fog-strong);
}

.nb{
  background:none;border:1px solid transparent;
  font-family:'Noto Serif JP',serif;
  font-size:var(--t-label);
  color:var(--dust);
  padding:0.25rem 0.6rem;cursor:pointer;
  transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:0.05rem;
  min-width:44px;min-height:44px;justify-content:center;
}
.nb-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:var(--t-label);
  /* 14px・WCAG準拠 */
  color:var(--fog-mid);
  font-style:italic;letter-spacing:0.1em;
}
@media(max-width:380px){.nb-sub{display:none}}
.nb:hover,.nb.on{border-color:var(--border);color:var(--paper)}
.nb:hover .nb-sub,.nb.on .nb-sub{color:var(--fog-strong)}

/* ══ SCREENS ══════════════════════════════════════ */
.scr{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;
  padding-top: calc(var(--safe-top) + 4.5rem);
  padding-bottom: calc(var(--safe-bot) + 2rem);
  padding-left:1.4rem;padding-right:1.4rem;
  overflow-y:auto;overflow-x:hidden;
  opacity:0;pointer-events:none;
  transition:opacity 0.45s;
  overscroll-behavior:contain;
}
.scr.on{opacity:1;pointer-events:all}

/* ══ TODAY ════════════════════════════════════════ */
/* 縦中央揃えは flex-start + padding-top で代替
   キーボードが開いてもコンテンツが隠れない        */
#s-q{justify-content:flex-start;padding-top:calc(var(--safe-top) + 5.5rem)}
.q-wrap{width:100%;max-width:580px}

.q-meta{
  display:flex;align-items:center;gap:0.6rem;
  margin-bottom:1.8rem;flex-wrap:wrap;row-gap:0.4rem;
}
.q-meta-left{display:flex;align-items:baseline;gap:0.4rem;flex-shrink:0}
.q-meta-day{
  font-size:var(--t-label);letter-spacing:0.4em;
  color:var(--gold);text-transform:uppercase;
}
.q-meta-day-en{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:var(--t-label);
  color:var(--fog-strong);
}
.q-meta-date{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:var(--t-label);
  color:var(--fog-mid);
}
.q-meta-line{flex:1;height:1px;background:var(--border);min-width:16px}

/* 問い: 日本語 主役 */
.q-block{margin-bottom:2.5rem}
.q-ja{
  font-family:'Noto Serif JP',serif;
  font-size:var(--t-q);
  font-weight:300;line-height:1.95;
  color:var(--paper);white-space:pre-line;
  margin-bottom:0.9rem;
}
/* 英語訳: 14px以上 + WCAG準拠コントラスト */
.q-en{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.9rem,2vw,1rem);
  font-style:italic;
  /* #8a7a68 on #080808: 5.2:1 */
  color:var(--fog-strong);
  white-space:pre-line;
  line-height:1.7;
}

.a-label-wrap{margin-bottom:0.75rem}
textarea{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid rgba(154,136,112,0.24);
  color:var(--paper);
  font-family:'Noto Serif JP',serif;
  font-size:var(--t-body);font-weight:300;line-height:1.95;
  padding:0.65rem 0.2rem;resize:none;outline:none;
  transition:border-color 0.3s;
}
textarea::placeholder{
  /* プレースホルダーも14px相当、fog-strong使用 */
  color:var(--fog-mid);
  font-style:italic;
}
textarea:focus{border-bottom-color:var(--gold)}

.mirror-btn{
  margin-top:1.6rem;background:none;
  border:1px solid rgba(154,136,112,0.3);
  color:var(--dust);cursor:pointer;transition:all 0.22s;
  padding:0.6rem 1.8rem;
  display:inline-flex;flex-direction:column;align-items:center;gap:0.14rem;
  min-height:44px;justify-content:center;
}
.mirror-btn-ja{font-family:'Noto Serif JP',serif;font-size:var(--t-body);letter-spacing:0.2em}
.mirror-btn-en{
  font-family:'Cormorant Garamond',serif;
  font-size:var(--t-label);letter-spacing:0.28em;font-style:italic;
  color:var(--fog-strong);text-transform:uppercase;
}
.mirror-btn:hover{border-color:var(--gold);color:var(--gold)}
.mirror-btn:hover .mirror-btn-en{color:rgba(160,120,32,0.7)}
.mirror-btn:disabled{opacity:0.28;cursor:not-allowed}

.kbd-hint{
  font-family:'Cormorant Garamond',serif;
  font-size:var(--t-label);font-style:italic;
  color:var(--fog-mid);margin-top:0.6rem;
  display:none;
}

/* 完了済み */
.done-box{text-align:center;max-width:500px;margin:0 auto}
.done-check{
  display:flex;align-items:center;justify-content:center;
  gap:0.5rem;flex-wrap:wrap;row-gap:0.25rem;
  font-size:var(--t-label);letter-spacing:0.4em;color:var(--gold);
  text-transform:uppercase;margin-bottom:1.6rem;
}
.done-check em{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--fog-strong);font-size:1em;letter-spacing:0.12em;text-transform:none;
}
.done-q{font-size:var(--t-small);color:var(--dust);margin-bottom:0.5rem;line-height:1.8}
.done-insight{
  font-size:var(--t-small);color:var(--paper);line-height:1.95;
  padding:1.2rem 1.3rem;
  border:1px solid var(--border);margin:1rem 0;
  background:rgba(240,235,224,0.02);text-align:left;
}
.done-action{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--gold-lt)}
.done-btns{margin-top:1.8rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap}

/* ══ MIRROR ═══════════════════════════════════════ */
#s-mirror{justify-content:flex-start}
.m-wrap{width:100%;max-width:580px}
.m-card{
  border:1px solid var(--border);
  padding:2rem 1.8rem;position:relative;
  background:rgba(240,235,224,0.02);margin-bottom:1.5rem;
}
.m-card::before,.m-card::after{
  content:'◈';position:absolute;
  color:rgba(160,120,32,0.4);font-size:0.5rem;
  top:-0.3rem;left:50%;transform:translateX(-50%);
  background:var(--ink);padding:0 0.5rem;
}
.m-card::after{top:auto;bottom:-0.3rem}
.m-section{margin-bottom:1.4rem}
.m-section:last-child{margin-bottom:0}
.md{height:1px;background:var(--border);margin:1.1rem 0}
.mq{font-size:var(--t-small);color:var(--dust);line-height:1.85}
.ma{font-size:var(--t-small);color:var(--paper);line-height:1.85}
.mi{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(0.95rem,2.2vw,1.05rem);
  font-weight:300;line-height:2.1;
  color:var(--paper);min-height:44px;
}
.mact{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1rem,2.2vw,1.12rem);font-style:italic;
  color:var(--gold-lt);line-height:1.7;min-height:30px;
}

/* ── RITUAL ── */
.ritual{
  border:1px solid rgba(160,120,32,0.25);
  padding:1.4rem 1.6rem;
  background:rgba(160,120,32,0.025);
  text-align:center;
  opacity:0;transition:opacity 0.9s;
  pointer-events:none;
}
.ritual.show{opacity:1;pointer-events:all}
.ritual-hl-ja{
  font-family:'Noto Serif JP',serif;
  font-size:var(--t-body);font-weight:400;color:var(--paper);
  letter-spacing:0.06em;display:block;margin-bottom:0.22rem;
}
.ritual-hl-en{
  font-family:'Cormorant Garamond',serif;
  font-size:var(--t-small);font-style:italic;
  color:var(--fog-strong);letter-spacing:0.12em;display:block;
}
.ritual-sub{
  font-size:var(--t-small);color:var(--dust);
  line-height:1.9;margin:0.7rem 0 1.1rem;
}
.ritual-sub em{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;color:var(--fog-strong);
}
.btn-row{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap}
.bx{
  display:inline-flex;align-items:center;gap:0.42rem;
  background:var(--paper);color:var(--ink);
  border:none;font-family:'Noto Serif JP',serif;font-size:var(--t-body);font-weight:500;
  padding:0.65rem 1.5rem;cursor:pointer;transition:background 0.2s;
  min-height:44px;
}
.bx:hover{background:var(--gold)}
.bx svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
.bsub{
  display:inline-flex;align-items:center;gap:0.38rem;
  background:none;color:var(--dust);
  border:1px solid rgba(154,136,112,0.24);
  font-family:'Cormorant Garamond',serif;font-size:var(--t-small);letter-spacing:0.14em;
  padding:0.65rem 1.1rem;cursor:pointer;text-transform:uppercase;transition:all 0.2s;
  min-height:44px;
}
.bsub:hover{border-color:var(--gold);color:var(--gold)}
.bsub svg{width:11px;height:11px;fill:currentColor}
.ghost-row{margin-top:0.9rem;display:flex;gap:1rem;justify-content:center}
.ghost{
  background:none;border:none;color:var(--fog-mid);
  font-family:'Cormorant Garamond',serif;
  font-size:var(--t-small);letter-spacing:0.2em;
  cursor:pointer;text-transform:uppercase;transition:color 0.2s;
  min-height:44px;display:flex;align-items:center;
}
.ghost:hover{color:var(--dust)}

/* ══ DIARY ════════════════════════════════════════ */
#s-diary{justify-content:flex-start;align-items:stretch}
.d-wrap{width:100%;max-width:580px;margin:0 auto}
.d-head{
  display:flex;align-items:baseline;justify-content:space-between;
  padding-bottom:1rem;margin-bottom:1.8rem;
  border-bottom:1px solid var(--border);
}
.d-title{display:flex;align-items:baseline;gap:0.6rem}
.d-title-ja{font-family:'Noto Serif JP',serif;font-size:1.3rem;font-weight:300;color:var(--paper)}
.d-title-sep{color:var(--border)}
.d-title-en{font-family:'IM Fell English',serif;font-size:0.85rem;color:var(--fog-strong);font-style:italic}
.d-sub{font-size:var(--t-label);letter-spacing:0.25em;color:var(--dust);text-transform:uppercase}
.d-empty{text-align:center;padding:4rem 0}
.d-empty-ja{font-size:var(--t-small);color:var(--dust);margin-bottom:0.4rem;line-height:1.8}
.d-empty-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:var(--t-small);color:var(--fog-strong)}
.entry{
  border-left:1px solid rgba(160,120,32,0.14);
  padding:0 0 2rem 1.4rem;position:relative;
}
.entry::before{
  content:'';position:absolute;
  width:5px;height:5px;border-radius:50%;
  background:var(--ink);border:1px solid rgba(160,120,32,0.45);
  left:-3px;top:0.5rem;
}
.e-date{font-size:var(--t-label);letter-spacing:0.32em;color:var(--gold);text-transform:uppercase;margin-bottom:0.5rem}
.e-q{font-size:var(--t-small);color:var(--dust);margin-bottom:0.4rem;line-height:1.75}
.e-a{font-size:var(--t-small);color:var(--fog-mid);margin-bottom:0.55rem;line-height:1.75}
.e-insight{font-size:var(--t-small);color:var(--paper);line-height:1.95;margin-bottom:0.42rem}
.e-action{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-style:italic;color:var(--gold);line-height:1.6}
.e-x{
  display:inline-flex;align-items:center;gap:0.26rem;
  font-size:var(--t-label);letter-spacing:0.22em;
  color:var(--fog-mid);text-transform:uppercase;margin-top:0.45rem;
}
.e-x svg{width:10px;height:10px;fill:currentColor}

/* ══ LOADING ══════════════════════════════════════ */
.dots{display:inline-flex;gap:5px;align-items:center}
.dots i{width:4px;height:4px;border-radius:50%;background:var(--gold);animation:dp 1.2s infinite;font-style:normal;display:block}
.dots i:nth-child(2){animation-delay:0.17s}
.dots i:nth-child(3){animation-delay:0.34s}
@keyframes dp{0%,100%{opacity:0.2;transform:scale(0.7)}50%{opacity:1;transform:scale(1)}}

/* ══ CORNERS ══════════════════════════════════════ */
.c{position:fixed;width:24px;height:24px;border-color:rgba(160,120,32,0.1);border-style:solid}
.c.tl{top:calc(var(--safe-top)+0.8rem);left:0.8rem;border-width:1px 0 0 1px}
.c.tr{top:calc(var(--safe-top)+0.8rem);right:0.8rem;border-width:1px 1px 0 0}
.c.bl{bottom:calc(var(--safe-bot)+0.8rem);left:0.8rem;border-width:0 0 1px 1px}
.c.br{bottom:calc(var(--safe-bot)+0.8rem);right:0.8rem;border-width:0 1px 1px 0}

/* ══ TOAST ════════════════════════════════════════ */
#toast{
  position:fixed;
  bottom:calc(var(--safe-bot) + 1.4rem);
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(8,8,8,0.97);
  border:1px solid rgba(160,120,32,0.28);
  color:var(--gold-lt);
  font-family:'Cormorant Garamond',serif;
  font-size:var(--t-small);letter-spacing:0.1em;
  padding:0.5rem 1.3rem;
  opacity:0;transition:all 0.28s;
  pointer-events:none;z-index:10000;
  white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ ANIMS ════════════════════════════════════════ */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.u0{opacity:0;animation:up 0.6s ease forwards}
.u1{opacity:0;animation:up 0.6s 0.1s ease forwards}
.u2{opacity:0;animation:up 0.6s 0.2s ease forwards}
.u3{opacity:0;animation:up 0.6s 0.32s ease forwards}

/* ══ RESPONSIVE ═══════════════════════════════════ */
@media(min-width:768px){
  /* タブレット以上: キーボード問題が軽微 → 問いを縦中央に */
  #s-q{
    justify-content:center;
    padding-top:calc(var(--safe-top) + 1rem);
  }
  .scr{
    padding-left:2rem;padding-right:2rem;
    padding-top:calc(var(--safe-top) + 5rem);
  }
  nav{padding:1rem 2rem}
}
@media(min-width:1024px){
  .scr{padding-left:2.5rem;padding-right:2.5rem}
}
</style>
</head>
<body>

<div class="c tl"></div><div class="c tr"></div>
<div class="c bl"></div><div class="c br"></div>
<div id="toast"></div>

<!-- ══ VEIL: 鏡だけ。短い言葉。 ══ -->
<div id="veil">
  <div class="veil-title">
    <span class="veil-ja">鏡</span>
    <span class="veil-en">KAGAMI</span>
  </div>
  <div class="veil-sub">
    <span class="veil-sub-ja">毎日ひとつの問い。ひとつの洞察。</span>
    <span class="veil-sub-en">One question. One insight. Every day.</span>
  </div>
</div>

<div id="root">
  <nav>
    <div class="nav-logo" onclick="goQ()">
      <span class="nav-logo-ja">鏡</span>
      <span class="nav-logo-en">KAGAMI</span>
    </div>
    <div class="nav-r">
      <div class="streak hidden" id="streak-badge">
        <span class="streak-f">🔥</span>
        <span class="streak-n" id="sc">0</span>
        <span class="streak-label" lang="en">days</span>
      </div>
      <button class="nb" id="nb-q" onclick="goQ()">
        今日<span class="nb-sub" lang="en">today</span>
      </button>
      <button class="nb" id="nb-d" onclick="goDiary()">
        日記<span class="nb-sub" lang="en">journal</span>
      </button>
    </div>
  </nav>

  <div class="scr" id="s-q">
    <div class="q-wrap" id="q-wrap"></div>
  </div>

  <div class="scr" id="s-mirror">
    <div class="m-wrap">
      <div class="m-card" id="cap">
        <div class="m-section">
          <div class="bilabel">問い <span lang="en">Question</span></div>
          <div class="mq" id="r-q"></div>
        </div>
        <div class="md"></div>
        <div class="m-section">
          <div class="bilabel">答え <span lang="en">Answer</span></div>
          <div class="ma" id="r-a"></div>
        </div>
        <div class="md"></div>
        <div class="m-section">
          <div class="bilabel">洞察 <span lang="en">Insight</span></div>
          <div class="mi" id="r-i"><div class="dots"><i></i><i></i><i></i></div></div>
        </div>
        <div class="m-section">
          <div class="bilabel">行動 <span lang="en">One Action</span></div>
          <div class="mact" id="r-act"></div>
        </div>
      </div>

      <div class="ritual" id="ritual">
        <span class="ritual-hl-ja">Xに記録して、今日を完成させる</span>
        <span class="ritual-hl-en" lang="en">Post to X — complete today's entry</span>
        <div class="ritual-sub">
          投稿することが日記の完成。<br>
          <em lang="en">The act of posting is the completion.</em>
        </div>
        <div class="btn-row">
          <button class="bx" onclick="shareX()">
            <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622z"/></svg>
            Xに投稿する
          </button>
          <button class="bsub" onclick="copyTxt()">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span lang="en">copy</span>
          </button>
        </div>
        <div class="ghost-row">
          <button class="ghost" onclick="saveImg()" lang="en">save image</button>
          <button class="ghost" onclick="skipShare()">今日は記録しない</button>
        </div>
      </div>
    </div>
  </div>

  <div class="scr" id="s-diary">
    <div class="d-wrap">
      <div class="d-head">
        <div class="d-title">
          <span class="d-title-ja">日記</span>
          <span class="d-title-sep">·</span>
          <span class="d-title-en" lang="en">Journal</span>
        </div>
        <div class="d-sub" id="d-cnt">0 日の記録</div>
      </div>
      <div id="d-list"></div>
    </div>
  </div>
</div>

<script>
const QS=[
  {d:"壱",dn:"I",
   ja:"今日、自分が\n本当は知っているのに\n認めていないことは何か。",
   en:"What do you already know,\nbut refuse to admit?"},
  {d:"弐",dn:"II",
   ja:"もし結果が\n保証されていたとしたら、\n今日何をするか。",
   en:"If the outcome were guaranteed,\nwhat would you do today?"},
  {d:"参",dn:"III",
   ja:"誰かが自分に\n必要としているものを、\nまだ渡せていないか。",
   en:"What does someone need from you\nthat you haven't yet given?"},
  {d:"四",dn:"IV",
   ja:"今の自分の選択を\n動かしている恐れは\n何か。",
   en:"What fear is quietly driving\nyour choices right now?"},
  {d:"五",dn:"V",
   ja:"当たり前に感じていて、\n実は深く感謝すべき\nことは何か。",
   en:"What feels ordinary,\nbut deserves deep gratitude?"},
  {d:"六",dn:"VI",
   ja:"これひとつやれば\n他のすべてが\n楽になること、何か。",
   en:"What one thing, done today,\nmakes everything else easier?"},
  {d:"七",dn:"VII",
   ja:"自分が今、\n自分自身についている\n嘘は何か。",
   en:"What lie are you\ntelling yourself right now?"},
];

const TODAY=QS[new Date().getDay()];
let cAns='',cIns='',cAct='',cShort='',cLabel='';

const isMobile=()=>window.matchMedia('(pointer:coarse)').matches;

const APP_URL = "https://osakenpiro.github.io/kagami/";

// ─── STORAGE ────────────────────────────────────
const LS_KEY='kagami_v7';
function getEntries(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]')}catch{return[]}}
function saveEntry(e){
  const a=getEntries();const k=dateKey();
  const i=a.findIndex(x=>x.date===k);
  if(i>=0)a[i]=e;else a.unshift(e);
  localStorage.setItem(LS_KEY,JSON.stringify(a));
}
function dateKey(){const d=new Date();return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}
function p(n){return String(n).padStart(2,'0')}
function dateFmt(){
  const d=new Date();
  const w=['日','月','火','水','木','金','土'];
  return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w[d.getDay()]}）`;
}
function calcStreak(){
  const es=getEntries().filter(e=>e.insight);
  if(!es.length)return 0;
  let s=0,d=new Date();
  for(let i=0;i<90;i++){
    const k=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    if(es.find(e=>e.date===k))s++;else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function updStreak(){
  const s=calcStreak();
  document.getElementById('sc').textContent=s;
  document.getElementById('streak-badge').classList.toggle('hidden',s===0);
}

// ─── VEIL ───────────────────────────────────────
function initVeil(){
  const delay=getEntries().length>0?300:3500;
  setTimeout(()=>document.getElementById('veil').classList.add('gone'),delay);
}

// ─── NAV ────────────────────────────────────────
function goScreen(id){
  document.querySelectorAll('.scr').forEach(s=>{s.classList.remove('on');s.scrollTop=0});
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(id==='s-q'||id==='s-mirror')document.getElementById('nb-q').classList.add('on');
  if(id==='s-diary')document.getElementById('nb-d').classList.add('on');
}
function goQ(){buildQ();goScreen('s-q')}
function goDiary(){buildDiary();goScreen('s-diary')}

// ─── XSS対策 ─────────────────────────────────────
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── TODAY ──────────────────────────────────────
function buildQ(){
  const done=getEntries().find(e=>e.date===dateKey());
  const w=document.getElementById('q-wrap');

  if(done&&done.insight){
    w.innerHTML=`
      <div class="done-box u0">
        <div class="done-check">
          本日の記録 · 完了
          <em lang="en">today's entry complete</em>
          ✓
        </div>
        <div class="done-q">「${esc(done.question)}」</div>
        <div class="done-insight">${esc(done.insight)}</div>
        <div class="done-action">${esc(done.action)}</div>
        <div class="done-btns">
          <button class="bx" onclick="reshare()" style="font-size:0.9rem;padding:0.55rem 1.2rem">
            <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622z"/></svg>
            もう一度シェア
          </button>
          <button class="ghost" onclick="goDiary()" style="font-size:0.9rem">日記を見る →</button>
        </div>
      </div>`;
    return;
  }

  const kbdHint=!isMobile()
    ?`<div class="kbd-hint" style="display:block">⌘ + Enter / Ctrl + Enter で送信</div>`:'';

  w.innerHTML=`
    <div class="q-meta u0">
      <div class="q-meta-left">
        <span class="q-meta-day">問いの日・${TODAY.d}</span>
        <span class="q-meta-day-en" lang="en">Question ${TODAY.dn}</span>
      </div>
      <span class="q-meta-date">${dateFmt()}</span>
      <div class="q-meta-line"></div>
    </div>
    <div class="q-block u1">
      <div class="q-ja">${TODAY.ja}</div>
      <div class="q-en" lang="en">${TODAY.en}</div>
    </div>
    <div class="u2">
      <div class="a-label-wrap">
        <div class="bilabel">答え <span lang="en">your answer</span></div>
      </div>
      <textarea id="ai" rows="2"
        placeholder="正直に、率直に…"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="handleKey(event)"
      ></textarea>
    </div>
    <button class="mirror-btn u3" id="mbtn" onclick="doReflect()">
      <span class="mirror-btn-ja">鏡に映す</span>
      <span class="mirror-btn-en" lang="en">reflect</span>
    </button>
    ${kbdHint}`;

  if(!isMobile()){
    setTimeout(()=>{const el=document.getElementById('ai');if(el)el.focus()},500);
  }
}

function handleKey(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();doReflect()}
}

// ─── REFLECT ────────────────────────────────────
async function doReflect(){
  const el=document.getElementById('ai');if(!el)return;
  const ans=el.value.trim();
  if(!ans){
    el.style.borderBottomColor='var(--gold)';
    el.placeholder='まず答えを書いてください…';
    return;
  }
  cAns=ans;cLabel=dateFmt();
  document.getElementById('mbtn').disabled=true;

  document.getElementById('r-q').textContent=TODAY.ja.replace(/\n/g,'　');
  document.getElementById('r-a').textContent=ans;
  document.getElementById('r-i').innerHTML='<div class="dots"><i></i><i></i><i></i></div>';
  document.getElementById('r-act').innerHTML='';
  document.getElementById('ritual').classList.remove('show');
  goScreen('s-mirror');

  const prompt=`あなたは「鏡」。人が自分自身を見つめるための静かな反射板。

今日の問い：「${TODAY.ja.replace(/\n/g,'')}」
答え：「${ans}」

1.【洞察】答えの奥の本人が気づいていない真実を2〜3文。優しく鋭く、詩的に具体的に。説教せず映す。
2.【行動】今日できる唯一の行動を一文で。
3.【一言】洞察を最も核心的な一文（40字以内）に凝縮。Xに投稿される。

JSONのみ（余分な文字不要）:
{"insight":"洞察文","action":"行動文","short":"一言"}`;

  try{
    const res=await fetch("https://kagami-worker.kagami-osakenpiro.workers.dev",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        messages:[{role:"user",content:prompt}]})
    });
    const d=await res.json();
    const parsed=JSON.parse(d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
    cIns=parsed.insight;cAct=parsed.action;cShort=parsed.short||parsed.insight.split('。')[0]+'。';

    const iEl=document.getElementById('r-i'),aEl=document.getElementById('r-act');
    iEl.style.opacity='0';
    setTimeout(()=>{
      iEl.textContent=parsed.insight;
      iEl.style.transition='opacity 1s';iEl.style.opacity='1';
      setTimeout(()=>{
        aEl.textContent=parsed.action;
        aEl.style.transition='opacity 1.1s';aEl.style.opacity='1';
        saveEntry({date:dateKey(),dateLabel:cLabel,
          question:TODAY.ja.replace(/\n/g,''),answer:cAns,
          insight:parsed.insight,action:parsed.action,short:cShort,postedToX:false});
        updStreak();
        setTimeout(()=>document.getElementById('ritual').classList.add('show'),900);
      },650);
    },280);

  }catch(err){
    const iEl=document.getElementById('r-i');
    iEl.innerHTML='';
    iEl.style.opacity='0';
    setTimeout(()=>{
      iEl.textContent='鏡が曇っています。「今日」に戻ってもう一度お試しください。';
      iEl.style.color='var(--dust)';
      iEl.style.transition='opacity 0.6s';iEl.style.opacity='1';
    },200);
    // ボタンを再有効化 — ユーザーが今日画面に戻って再試行できる
    const btn=document.getElementById('mbtn');
    if(btn)btn.disabled=false;
  }
}

// ─── SHARE ──────────────────────────────────────
/*
 * X無料ユーザー: 280文字上限
 * フォーマット設計（目標: ~220字で余裕を持たせる）
 *
 * 🪞 KAGAMI #1 — 2/27（金）           ≈ 22字
 * 「問い（省略版）」                   ≈ 24字
 * → {short: 40字以内の蒸留}           ≈ 42字
 * 行動: {action}                       ≈ 30字
 * #KAGAMI #鏡日記                      ≈ 14字
 * 改行等                               ≈ 10字
 * ─────────────────────────────────── 計 ≈ 142字
 * ユーザーの答え（最大60字）           ≈ 60字
 *
 * 合計 ≈ 200字 / 280字制限
 */
function tweetText(){
  const s=calcStreak();
  // 日付を短縮: "2026年2月27日（金）" → "2/27（金）"
  const d=new Date();
  const w=['日','月','火','水','木','金','土'];
  const shortDate=`${d.getMonth()+1}/${d.getDate()}（${w[d.getDay()]}）`;

  // 問いを短縮: 改行除去して最大30字
  const q=TODAY.ja.replace(/\n/g,'');
  const shortQ=q.length>28?q.slice(0,27)+'…':q;

  // 答えを最大50字に
  const shortAns=cAns.length>50?cAns.slice(0,49)+'…':cAns;

  return[
    `🪞 KAGAMI #${s} — ${shortDate}`,
    ``,
    `Q. ${shortQ}`,
    `A. ${shortAns}`,
    ``,
    `→ ${cShort}`,
    ``,
    `行動: ${cAct}`,
    ``,
    `#KAGAMI #鏡日記`,
  ].join('\n');
}
function shareX(){
  const text = tweetText();
  window.open(
    `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(APP_URL)}`,
    '_blank',
    'width=560,height=420'
  );

  const es=getEntries();const i=es.findIndex(e=>e.date===dateKey());
  if(i>=0){es[i].postedToX=true;localStorage.setItem(LS_KEY,JSON.stringify(es))}
  toast('Xに投稿しました ✓');
  }
async function copyTxt(){
  try{await navigator.clipboard.writeText(tweetText());toast('コピーしました')}
  catch{toast('コピーできませんでした')}
}
async function saveImg(){
  toast('画像を生成中…');
  try{
    const cv=await html2canvas(document.getElementById('cap'),
      {backgroundColor:'#080808',scale:2,useCORS:true,logging:false});
    const a=document.createElement('a');
    a.download=`kagami-${dateKey()}.png`;a.href=cv.toDataURL('image/png');a.click();
    toast('保存しました');
  }catch{toast('保存に失敗しました')}
}
function skipShare(){toast('日記に保存しました');setTimeout(()=>goQ(),1100)}
function reshare(){
  const e=getEntries().find(x=>x.date===dateKey());if(!e)return;
  cAns=e.answer;cIns=e.insight;cAct=e.action;
  cShort=e.short||(e.insight.split('。')[0]+'。');
  cLabel=e.dateLabel||dateFmt();
  window.open(
  `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText())}&url=${encodeURIComponent(APP_URL)}`,
  '_blank',
  'width=560,height=420'
);
}

// ─── DIARY ──────────────────────────────────────
function buildDiary(){
  const es=getEntries().filter(e=>e.insight);
  document.getElementById('d-cnt').textContent=`${es.length} 日の記録`;
  const dl=document.getElementById('d-list');
  if(!es.length){
    dl.innerHTML=`<div class="d-empty">
      <div class="d-empty-ja">まだ記録がありません。</div>
      <div class="d-empty-en" lang="en">No entries yet. Begin with today's question.</div>
    </div>`;
    return;
  }
  dl.innerHTML=es.map(e=>`
    <div class="entry">
      <div class="e-date">${esc(e.dateLabel||e.date)}</div>
      <div class="e-q">「${esc(e.question)}」</div>
      <div class="e-a">${esc(e.answer)}</div>
      <div class="e-insight">${esc(e.insight)}</div>
      <div class="e-action">${esc(e.action)}</div>
      ${e.postedToX?`<div class="e-x">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622z"/></svg>
        <span lang="en">X に記録済み · posted to X</span>
      </div>`:''}
    </div>`).join('');
}

// ─── UTIL ────────────────────────────────────────
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2200);
}

// ─── BOOT ────────────────────────────────────────
updStreak();
buildQ();
goScreen('s-q');
initVeil();
</script>
</body>
</html>
